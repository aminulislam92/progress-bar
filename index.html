<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressbar</title>
    <!-- tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-black">

    <div class=" bg-white p-4 rounded max-w-170 grid grid-cols-1 md:grid-cols-3 justify-center items-center gap-5 mt-50 text-center mx-auto">
        <div class="grid bg-green-500 rounded px-8 py-2 text-4xl uppercase text-amber-500 font-bold gap-3 shadow">Gold<span class="text-white font-mono font-semibold" data-number="100">0</span></div>
        <div class="grid bg-green-500 rounded px-8 py-2 text-4xl uppercase text-red-400 font-bold gap-3 shadow">Dimond<span class="text-white font-mono font-semibold" data-number="150">0</span></div>
        <div class="grid bg-green-500 rounded px-8 py-2 text-4xl uppercase text-violet-500 font-bold gap-3 shadow">Bronze<span class="text-white font-mono font-semibold" data-number="200">0</span></div>
    </div>


    <!-- external js -->
    <script src="script.js"></script>
</body>
</html>
